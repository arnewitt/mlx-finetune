# configs/mentor_style_local.yaml
# Teacher: local Qwen2.5-7B (requires download first)
# Student: Qwen3.5-0.8B (default from base.yaml)
#
# Setup:
#   uv run python download_model.py download mlx-community/Qwen2.5-7B-Instruct-4bit
#   uv run python generate_data.py --config configs/mentor_style_local.yaml
#   uv run python main.py train --config configs/mentor_style_local.yaml

experiment_name: "mentor-style-local-qwen7b"

teacher:
  backend: "local_mlx"
  model: "mlx-community/Qwen2.5-7B-Instruct-4bit"
  max_tokens: 600
  temperature: 0.85
  examples_file: "examples/warm_mentor.jsonl"
  max_examples: 5

seeds:
  files:
    - "seeds/general_knowledge.txt"
    - "seeds/style_transfer.txt"
  samples_per_seed: 5
  augment: true

generation:
  output_file: "mentor_local.parquet"

student:
  batch_size: 1
  num_layers: 8
  valid_split: 0.2
  max_seq_length: 512

mlflow:
  experiment: "mentor-style-local"
